openapi: 3.0.0
info:
  title: Product API
  version: v1.0.0
  description: A simple API for managing products.

components:
  schemas:
    Product:
      type: object
      required:
        - uuid
        - name
        - created_at
        - updated_at
      properties:
        uuid:
          type: string
          format: uuid
          description: Unique identifier for the product.
          readOnly: true
        name:
          type: string
          description: Name of the product.
        description:
          type: string
          nullable: true
          description: Optional description of the product.
        price:
          type: number
          format: float
          nullable: true
          description: Price of the product.
          minimum: 0
        created_at:
          type: string
          format: date-time
          description: Timestamp of when the product was created.
          readOnly: true
        updated_at:
          type: string
          format: date-time
          description: Timestamp of when the product was last updated.
          readOnly: true

    ProductInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the product.
        description:
          type: string
          nullable: true
          description: Optional description of the product.
        price:
          type: number
          format: float
          nullable: true
          description: Price of the product.
          minimum: 0

    ProductList:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'

paths:
  /products:
    get:
      summary: List all products
      operationId: listProducts
      responses:
        '200':
          description: A list of products.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'
    post:
      summary: Create a new product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          headers:
            Location:
              description: URL of the newly created product.
              schema:
                type: string
                format: uri

  /products/{product_uuid}:
    get:
      summary: Get a product by UUID
      operationId: getProductByUuid
      parameters:
        - name: product_uuid
          in: path
          required: true
          description: UUID of the product to retrieve.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The requested product.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found.
    put:
      summary: Update a product by UUID
      operationId: updateProductByUuid
      parameters:
        - name: product_uuid
          in: path
          required: true
          description: UUID of the product to update.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found.
    delete:
      summary: Delete a product by UUID
      operationId: deleteProductByUuid
      parameters:
        - name: product_uuid
          in: path
          required: true
          description: UUID of the product to delete.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Product deleted successfully.
        '404':
          description: Product not found.
